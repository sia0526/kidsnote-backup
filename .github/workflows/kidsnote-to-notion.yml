# Kidsnote → Notion mirror
#
# MANUAL EXECUTION ONLY. Kidsnote's login flow can no longer be driven by
# a headless HTTP client (the page is a Next.js SPA). So the workflow
# relies on a `sessionid` cookie the operator extracts manually from a
# logged-in browser session (Chrome F12 → Application → Cookies) and
# stores in the KIDSNOTE_SESSION_COOKIE secret. That cookie typically
# lasts ~30 days; when it expires, re-extract and re-run.
#
# Dedup: each new Notion page records the kidsnote `Report ID`. Subsequent
# runs query the DB once at startup and skip reports whose id is already
# stored, so re-running is safe and idempotent.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   KIDSNOTE_SESSION_COOKIE   value of the `sessionid` cookie for kidsnote.com
#   NOTION_TOKEN              internal integration token from notion.so/profile/integrations
#   NOTION_DATABASE_ID        32-char hex id from your Notion DB URL

name: Kidsnote → Notion mirror

on:
  workflow_dispatch:
    inputs:
      # Layout principle (2026-05-23 user feedback): default values reflect
      # the "happy path" — leave everything as-is to get the full backup
      # with AI dashboards. Operators only flip a value when they want
      # something OFF. Descriptions are Korean and explain what each
      # option does in plain language.
      limit:
        description: "최근 N개 알림장만 백업 (전체 백업이면 비워두세요. 예: 3 입력 시 최근 3개만)"
        required: false
        default: ""
      monthly_sample:
        description: "테스트 모드 — 매월 알림장 1개씩만 처리 (셋업 검증·빠른 확인용. 평소엔 false)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force_refresh:
        description: "기존 노션 페이지 모두 archive 후 처음부터 재발행 (코드 업데이트·prompt 개선 후 사용. 평소엔 false)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      # ---- Multi-child accounts ----
      # If your kidsnote account has more than one child, the script needs
      # to know which one to mirror. The sessionid cookie itself isn't
      # child-scoped (it doesn't matter which child you "select" in the
      # kidsnote web UI before extracting the cookie), so the script
      # defaults to the first child the API returns. Set this to the
      # other child's NAME (case-insensitive substring) to override.
      # Leave empty for single-child accounts.
      child_name:
        description: "자녀 1명이면 비워두세요. 자녀 2명 이상이면 백업할 아이 이름 일부 입력 (예: '하린')"
        required: false
        default: ""

      # ---- AI master toggle (default OFF) ----
      # 2026-05-27: default flipped to OFF after the 1-year run took
      # ~30h with AI on. AI off finishes in 1-3 hours and produces a
      # clean keepsake backup (only the 3 statistical dashboards).
      # Operators who want the AI gloss (1인칭 일기·부모 편지·LLM
      # 대시보드 4종) flip to ``on``. on/off chosen over true/false
      # because operators consistently confused the inverted
      # disable-vs-enable polarity in support reports.
      #
      # ``default_or_repo_var`` option: when the operator wants AI on
      # but doesn't want to flip it every time they Run workflow, they
      # can set a repository variable ``AI_FEATURES=on`` (Settings →
      # Secrets and variables → Actions → Variables tab). The
      # workflow body falls back to that variable when this input is
      # left at its default. This is also what cron schedule events
      # see — the ``inputs`` context is empty on schedule, so without
      # this fallback the 4 LLM dashboards never regenerate on cron.
      use_ai_features:
        description: "AI 가공 — 알림장 안(💭요약·🧒자녀일기·👨‍👩‍👧부모편지) + 별도 페이지 4개(📖성장스토리·🌟마일스톤·🌱관심사·💌선생님께). 기본 off / cron도 따라 off. 항상 on으로 돌리고 싶으면 repo Variables에 AI_FEATURES=on 추가."
        required: false
        default: "off"
        type: choice
        options: ["off", "on"]

      # ---- 4 LLM dashboards individually (default ON if master ON) ----
      # The master use_ai_features above wins — when it's ``off``, these
      # don't matter. With master ``on``, each of these defaults to ``on``;
      # flip one to ``off`` if you want all AI callouts but skip a single
      # dashboard (some read awkwardly post-graduation).
      use_growth_story:
        description: "📖 매월 성장 스토리 별도 페이지 생성 (use_ai_features=on일 때만 적용)"
        required: false
        default: "on"
        type: choice
        options: ["on", "off"]
      use_milestones:
        description: "🌟 우리 아이의 처음들(마일스톤) 별도 페이지 생성 (use_ai_features=on일 때만 적용)"
        required: false
        default: "on"
        type: choice
        options: ["on", "off"]
      use_interests:
        description: "🌱 분기별 관심사 별도 페이지 생성 (use_ai_features=on일 때만 적용)"
        required: false
        default: "on"
        type: choice
        options: ["on", "off"]
      use_teacher_thanks:
        description: "💌 연도별 선생님께 감사 카드 별도 페이지 생성 (use_ai_features=on일 때만 적용)"
        required: false
        default: "on"
        type: choice
        options: ["on", "off"]
  # Auto-resume: a 1-year backfill can take 18-30 hours of compute,
  # but a GitHub-hosted runner caps a single job at 6 hours. Without
  # cron, the user would have to manually re-trigger after every cap.
  # With this schedule the workflow self-resumes every 4 hours; the
  # script tracks elapsed time and exits cleanly at 5h30m so the next
  # cron run can pick up via dedup. Once the backup is complete each
  # cron run finishes in ~1-2 minutes (no new alimnotas to process).
  # 2026-05-25: cron interval widened 4h → 6h. Each cycle does ~5h work
  # (publish loop + dashboards within the 6h GHA cap). At 4h interval,
  # consecutive cycles queued up and the older ones got auto-cancelled —
  # losing in-flight Notion commits and confusing operators ("backup
  # stopped at date X"). At 6h interval, each cycle has time to drain
  # before the next one fires.
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: read

concurrency:
  group: kidsnote-to-notion
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Long timeout: a 1-year backfill with photo-heavy reports
    # (avg 15-25 images/report + Ollama-driven LLM dashboards) ran past
    # the 6h cap on the first try, so we ask for 12h. GitHub-hosted
    # runners cap public repos at 35 hours of wall-time per workflow.
    # Re-runs after the first backfill are fast (dedup skips done).
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install fetcher deps + image helpers
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/kidsnote_fetch/requirements.txt
          # Pillow + piexif for in-memory EXIF strip + auto-compress
          # to Notion's 5 MiB per-file cap.
          pip install pillow piexif

      # ---- Ollama for body summary + LLM dashboards ----
      # Local LLM runs inside the runner — no API key / cost.
      #
      # llama3.1:8b (~4.7GB): reverted from qwen2.5:14b on 2026-05-23
      # after production runs proved 14B is too slow on the GHA CPU
      # runner — alimnota publish + 4 LLM dashboards consistently ran
      # 7-9 hours, hitting the 6h hard cap mid-dashboard and blocking
      # subsequent cron runs (concurrency was queueing then cancelling).
      # The new defensive filters (cjk + english_leak + input_copy +
      # retry-with-temperature) make 8B's quality acceptable; we trade
      # the 14B perspective wins for a backup that actually finishes.
      #
      # When `use_ai_features=false`, both steps below are skipped so
      # AI-opt-out runs don't pay the ~5min model-pull cost.
      # ``effective_ai`` resolves the master AI toggle for BOTH manual
      # dispatch AND cron schedule. On schedule events ``inputs.*`` is
      # empty (since no one filled the form), so we fall back to a
      # repo variable OR a repo secret named ``AI_FEATURES``. In
      # practice operators add ``AI_FEATURES=on`` to whichever tab
      # (Variables OR Secrets) they happen to land on — both work the
      # same here. The value isn't sensitive (just ``on`` / ``off``),
      # but the Secrets tab is where the existing tokens live so it
      # gets used by muscle memory.
      - name: Resolve effective AI toggle
        id: ai
        env:
          INPUT_AI: ${{ inputs.use_ai_features }}
          REPO_VAR_AI: ${{ vars.AI_FEATURES }}
          REPO_SECRET_AI: ${{ secrets.AI_FEATURES }}
        run: |
          if [ "$INPUT_AI" = "on" ]; then
            echo "value=on" >> "$GITHUB_OUTPUT"
          elif [ -z "$INPUT_AI" ] && { [ "$REPO_VAR_AI" = "on" ] || [ "$REPO_SECRET_AI" = "on" ]; }; then
            echo "value=on" >> "$GITHUB_OUTPUT"
          else
            echo "value=off" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Ollama models
        id: ollama-cache
        if: ${{ steps.ai.outputs.value == 'on' }}
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-llama3.1-8b-v2

      - name: Install Ollama + pull model
        if: ${{ steps.ai.outputs.value == 'on' }}
        run: |
          if ! command -v ollama >/dev/null 2>&1; then
            curl -fsSL https://ollama.com/install.sh | sh
          fi
          # Start ollama in background
          ollama serve > /tmp/ollama.log 2>&1 &
          # Wait for ready (max 30s)
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/version >/dev/null 2>&1; then
              echo "ollama ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Pull model (cached after first run, ~5min first time)
          ollama pull llama3.1:8b

      - name: Mirror Kidsnote → Notion
        env:
          KIDSNOTE_SESSION_COOKIE: ${{ secrets.KIDSNOTE_SESSION_COOKIE }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Tell notion_mirror.py where Ollama lives + which model to use
          OLLAMA_HOST: "http://localhost:11434"
          OLLAMA_MODEL: "llama3.1:8b"
          PYTHONUNBUFFERED: "1"
          # ---- Multi-child / LLM-skip env passthrough ----
          # The user-facing inputs use the positive form (`use_ai_features`,
          # `use_growth_story`, etc) and default to `true` so the happy
          # path needs zero flipping. Internally fetch.py still reads the
          # legacy negative env names (DISABLE_*); we invert here with
          # ternary expressions instead of renaming everything downstream.
          KIDSNOTE_CHILD_NAME: ${{ inputs.child_name }}
          # 2026-05-27: on/off semantics + default off for use_ai_features.
          # Master: uses ``steps.ai.outputs.value`` so cron schedule also
          # honours the repo Variable AI_FEATURES (inputs.* is empty on
          # schedule events). Individual dashboards: DISABLE=true only
          # when explicitly 'off' (default 'on' keeps them enabled if
          # master is also 'on').
          DISABLE_ALL_LLM: ${{ steps.ai.outputs.value == 'on' && 'false' || 'true' }}
          DISABLE_GROWTH_STORY: ${{ inputs.use_growth_story == 'off' && 'true' || 'false' }}
          DISABLE_MILESTONES: ${{ inputs.use_milestones == 'off' && 'true' || 'false' }}
          DISABLE_INTERESTS: ${{ inputs.use_interests == 'off' && 'true' || 'false' }}
          DISABLE_TEACHER_THANKS: ${{ inputs.use_teacher_thanks == 'off' && 'true' || 'false' }}
        run: |
          set -eu
          ARGS=( "--auth-mode" "session-cookie-env" "--publish-to-notion" "--no-local-save" )
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS+=( "--limit" "${{ inputs.limit }}" )
          fi
          if [ "${{ inputs.monthly_sample }}" = "true" ]; then
            ARGS+=( "--monthly-sample" )
          fi
          if [ "${{ inputs.force_refresh }}" = "true" ]; then
            ARGS+=( "--force-refresh" )
          fi
          python tools/kidsnote_fetch/fetch.py "${ARGS[@]}"

      - name: Verify required secrets were present
        if: failure()
        env:
          KIDSNOTE_SESSION_COOKIE: ${{ secrets.KIDSNOTE_SESSION_COOKIE }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          for s in KIDSNOTE_SESSION_COOKIE NOTION_TOKEN NOTION_DATABASE_ID; do
            if [ -z "${!s:-}" ]; then
              echo "::error::repo secret '$s' is empty or unset"
            fi
          done
